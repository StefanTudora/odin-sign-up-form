<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="sign-up-page">
    <div class="presentation-card">
        <img class="background" src="assets/background.jpg">
        <div class="stacked-logo">
            <img id="odin-image" src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png">
            <div id="odin-image-title">ODIN</div>
        </div>
    </div>
    <div class="sign-up-container">
        <div class="presentation">
            <p class="intro-description">This is not a real online service! You know you need somnething like this in your life to help you realize your deepest dream. Sign up <em>now</em> to get started.</p>
            <p class="intro-description">You <em>know</em> you want to!</p>
        </div>
        <form class="sign-up-form">
            <!-- Placeholder elements, revise -->
            <p style="padding: 20px; font-size: 30px;">Let's do this</p>
            <div class="inputs">
                <div class="input_pair">
                    <label for="first-name">FIRST NAME:</label>
                    <input type="text" id="first-name" pattern="[A-Za-z]+">
                </div>
                <div class="input_pair">
                    <label for="last-name">LAST NAME:</label>
                    <input type="text" id="last-name" pattern="[A-Za-z]+">
                </div>
                <div class="input_pair">
                    <label for="email">EMAIL:</label>
                    <input type="email" id="email">
                </div>
                <div class="input_pair">
                    <label for="phone">PHONE NUMBER:</label>
                    <input type="number" id="phone">
                </div>
                <div class="input_pair">
                    <label for="passwd">PASSWORD:</label>
                    <input type="text" id="passwd">
                </div>
                <div class="input_pair">
                    <label for="passwd-confirm">CONFIRM PASSWORD:</label>
                    <input type="text" id="passwd-confirm">
                </div>
            </div>
        </form>
        <button>Create account</button>
        <div class="login-alternative">
            <p>Have an account? Log in</p>
        </div>
    </div>
    </div>

</body>
</html>
